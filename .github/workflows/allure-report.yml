name: QA Tests & Allure Report Deployment

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5' # Lunes a Viernes a las 9 AM UTC
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ✅ OPTIMIZACIÓN 1: CACHE DE DEPENDENCIAS (Ahorra ~5-10 min)
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      - name: Install Allure Commandline
        run: |
          curl -sSL https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz | tar -xz -C /opt/
          echo "/opt/allure-2.29.0/bin" >> $GITHUB_PATH

      # CONFIGURACIÓN DE NAVEGADORES
      # Cambiar 'chrome' por 'all' para ejecutar en Chrome, Firefox y Edge.
      # Nota: 'all' tardará más. 'chrome' es rápido para reportes diarios.
      - name: Set Browser Configuration
        run: echo "BROWSER=chrome" >> $GITHUB_ENV
        # Para ejecutar todos los navegadores, cambiar la línea de arriba por:
        # run: echo "BROWSER=all" >> $GITHUB_ENV

      - name: Run Tests (Pytest with Allure)
        run: |
          # Ejecuta todos los tests generando reporte Allure. Sin paralelismo para evitar bloqueos en CI.
          pytest . --alluredir=./allure-results --clean-alluredir -v
        continue-on-error: true

      - name: Debug Check Results
        run: |
          echo "--- Contenido de allure-results ---"
          ls -R ./allure-results || echo "CARPETA VACIA"

      - name: Generate Allure Report
        run: |
          allure generate ./allure-results -o ./allure-report --clean
          echo "--- Contenido de allure-report ---"
          ls -R ./allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: .
          keep_files: false