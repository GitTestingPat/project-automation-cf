# .github/dependabot.yml
# Configuración de Dependabot para mantenimiento automático de dependencias
# Docs: https://docs.github.com/es/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ─────────────────────────────────────────────────────────────
  # 1. Dependencias de Python (pip) - requirements.txt
  # ─────────────────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "automated-pr"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    reviewers:
      - "GitTestingPat"
    allow:
      - dependency-type: "all"
    # Ignorar actualizaciones mayores automáticamente (requieren revisión manual)
    ignore:
      - dependency-name: "selenium"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pytest"
        update-types: ["version-update:semver-major"]

  # ─────────────────────────────────────────────────────────────
  # 2. GitHub Actions - workflows en .github/workflows/
  # ─────────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
      - "ci-cd"
      - "automated-pr"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    reviewers:
      - "GitTestingPat"

  # ─────────────────────────────────────────────────────────────
  # 3. Para frontend o herramientas JS en el futuro
  # ─────────────────────────────────────────────────────────────
  # - package-ecosystem: "npm"
  #   directory: "/"
